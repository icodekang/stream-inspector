name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller --name "StreamInspector" --windowed --onefile --icon=app.ico --add-data "app.ico;." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamInspector-windows
          path: dist/StreamInspector.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller --name "StreamInspector" --windowed --onefile --icon=app.ico --add-data "app.ico:." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamInspector-linux
          path: dist/StreamInspector

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller --name "StreamInspector" --windowed --onefile --icon=app.ico --add-data "app.ico:." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamInspector-macos
          path: dist/StreamInspector

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          VERSION=${{ github.ref_name }}
          mv StreamInspector-windows/StreamInspector.exe StreamInspector-${VERSION}-windows.exe
          mv StreamInspector-linux/StreamInspector StreamInspector-${VERSION}-linux
          mv StreamInspector-macos/StreamInspector StreamInspector-${VERSION}-macos
          chmod +x StreamInspector-${VERSION}-linux StreamInspector-${VERSION}-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Stream Inspector ${{ github.ref_name }}

            RTSP / RTSP over HTTP / RTSP over HTTPS 协议视频流抓包分析工具。

            ### 功能
            - 标准 RTSP (端口 554)
            - RTSP over HTTP 隧道 (rtsph://)
            - RTSP over HTTPS 隧道 (rtsps://)
            - H.264 / H.265 视频解码
            - Digest 认证自动重试
            - RTP 包头信息实时展示
            - 协议报文抓包展示
            - 深色主题 UI
          files: |
            StreamInspector-${{ github.ref_name }}-windows.exe
            StreamInspector-${{ github.ref_name }}-linux
            StreamInspector-${{ github.ref_name }}-macos
